id: eval-sol-001
name: "Evaluación de Endeudamiento"
description: "Mide el nivel de deuda respecto al patrimonio. Un ratio alto indica dependencia de financiamiento externo."
category: risk
condition: "financials.ratios.debtToEquity > 1.0"
priority: 85
then:
