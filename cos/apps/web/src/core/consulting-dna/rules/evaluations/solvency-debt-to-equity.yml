  severity: warning
  message: "Endeudamiento elevado. Si > 2.0, riesgo alto. Recomendar desapalancamiento y revisión de estructura de capital."
  recommendationId: rec-sol-001
enabled: true
tags:
  - endeudamiento
  - apalancamiento
  - deuda
