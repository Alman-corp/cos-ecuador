apiVersion: apps/v1
kind: Deployment
metadata:
  name: cos-web
  namespace: cos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cos-web
  template:
    metadata:
      labels:
        app: cos-web
    spec:
      containers:
        - name: web
          image: cos/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cos-secrets
                  key: supabase-url
            - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: cos-secrets
                  key: supabase-anon-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: cos-web
  namespace: cos
spec:
  selector:
    app: cos-web
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
