version: "3.9"
name: cos-ecuador

services:
  integration:
    build: ./services/integration
    ports: ["8000:8000"]
    environment:
      - SERVICE_NAME=integration
    depends_on: []

  tax-engine:
    build: ./services/tax-engine
    ports: ["8001:8001"]

  macro-service:
    build: ./services/macro-service
    ports: ["8002:8002"]

  finance:
    build: ./services/finance
    ports: ["8003:8003"]

  clients:
    build: ./services/clients
    ports: ["8004:8004"]

  documents:
    build: ./services/documents
    ports: ["8005:8005"]

  disaster-recovery:
    build: ./services/disaster-recovery
    ports: ["8006:8006"]

  plugin-registry:
    build: ./services/plugin-registry
    ports: ["8007:8007"]

  public-api:
    build: ./services/public-api
    ports: ["8008:8008"]

  ai-orchestrator:
    build: ./services/ai-orchestrator
    ports: ["8009:8009"]

  analytics-advanced:
    build: ./services/analytics-advanced
    ports: ["8010:8010"]

  security:
    build: ./services/security
    ports: ["8011:8011"]

  bi:
    build: ./services/bi
    ports: ["8012:8012"]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: cos
      RABBITMQ_DEFAULT_PASS: cos_secret
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 5s
      retries: 5

  notifications:
    build: ./services/notifications
    ports: ["3010:3010"]
    environment:
      - PORT=3010
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - RABBITMQ_URL=amqp://cos:cos_secret@rabbitmq:5672
      - SMTP_HOST=${SMTP_HOST:-smtp.sendgrid.net}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-apikey}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM:-noreply@cos-ecuador.com}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_FROM=${TWILIO_WHATSAPP_FROM:-+14155238886}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - NOTIFICATIONS_API_KEY=${NOTIFICATIONS_API_KEY}
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      rabbitmq:
        condition: service_healthy

  document-processor:
    build: ./services/document-processor
    ports: ["8013:8003"]
    environment:
      - DOC_OPENAI_API_KEY=${OPENAI_API_KEY}
      - DOC_OPENAI_EMBEDDING_MODEL=text-embedding-3-large

  command-center:
    build: ./command-center
    ports: ["3000:3000"]
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_NOTIFICATIONS_URL=http://localhost:3010
    depends_on:
      - integration
      - notifications
